<!DOCTYPE html>
<html>
<head>
  <title>Opening app...</title>
  <script>
    (function() {
      const path = window.location.pathname;
      const params = new URLSearchParams(window.location.search);
      const game_id = params.get("game_id");
      // Try to open the app
      window.location.href = "pickuplay://game/" + game_id;

      // Fallback to Play Store
      setTimeout(() => {
        window.location.href = "https://play.google.com/store/apps/details?id=com.pickuplay.app";
      }, 1500);
    })();
  </script>
</head>
<body>
  <p>Redirecting to the app...</p>
</body>
</html>
